# Author: Hemprasad Badgujar
# Outlook MCP Server Configuration
# Update these values for your environment

# === Shared Mailbox Configuration ===
# Email address of your shared mailbox (optional). Leave empty to use personal mailbox only.
# If set to a placeholder (e.g. your-shared-mailbox@example.com), Outlook will error—use a real address or leave empty.
shared_mailbox_email=

# Multiple shared mailboxes, comma-separated (optional; overrides single shared_mailbox_email when set)
# shared_mailbox_emails=box1@example.com,box2@example.com

# Display name of the shared mailbox (optional)
shared_mailbox_name=Shared Mailbox

# === Data Retention Policies (Informational Only) ===
# How many months emails are typically retained (for reference only)
personal_retention_months=6
shared_retention_months=12

# === Search Configuration ===
# Maximum number of emails to return per search
max_search_results=50

# Maximum characters to search in email body during pattern matching (for performance)
# This only affects the search phase, not the final email content
max_search_body_chars=500

# Maximum characters to include from email body in final results (0 = no limit)
# Set to 0 for full email body (needed for proper summarization)
max_body_chars=0

# Whether to include Sent Items folder in searches
include_sent_items=true

# Whether to include deleted items in searches  
include_deleted_items=false

# === Performance Settings ===
# Connection timeout in minutes
connection_timeout_minutes=10

# Number of retry attempts for failed operations
max_retry_attempts=3

# Batch size for processing large result sets
batch_processing_size=10

# Parallel search: max worker threads for personal + shared mailboxes (default 2)
parallel_search_workers=2

# Search cache: TTL in seconds (default 3600), max entries (default 100)
search_cache_ttl_seconds=3600
search_cache_max_entries=100

# Log search duration and result counts for tuning (default false)
profile_search=false

# === Alert Analysis Settings ===
# Whether to analyze email importance levels for urgency detection
analyze_importance_levels=true

# === Email Processing ===
# Search all folders recursively (not just Inbox)
search_all_folders=false

# Use folder traversal (set to false if GetRootFolder causes issues)
use_folder_traversal=false

# === Security Settings ===
# Try Extended MAPI login to potentially reduce security prompts (experimental)
use_extended_mapi_login=true

# Include timestamp in formatted responses
include_timestamps=true

# Clean HTML from email bodies
clean_html_content=true
