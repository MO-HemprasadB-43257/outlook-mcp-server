# Author: Hemprasad Badgujar
name: Test and Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dev dependencies
        run: pip install flake8 mypy
      - name: Flake8
        run: python -m flake8 src outlook_mcp.py
      - name: Mypy
        run: python -m mypy src outlook_mcp.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install CI dependencies (no pywin32 on Linux)
        run: pip install -r requirements-ci.txt
      - name: Run unit tests
        run: python -m pytest tests/test_config_reader.py tests/test_email_formatter.py tests/test_tools.py tests/test_get_latest_emails.py -v
        env:
          PYTHONPATH: .
